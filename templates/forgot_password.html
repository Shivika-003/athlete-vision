{% extends 'base.html' %}

{% block content %}
<div class="fade-in" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-main);">Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter your email to receive an OTP.</p>
        
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">Email Address</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.5);">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Send Security Code</button>
        </form>
    </div>
</div>
{% endblock %}
