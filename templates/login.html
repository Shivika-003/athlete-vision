{% extends 'base.html' %}

{% block content %}
<div class="fade-in" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-main);">Welcome Back</h2>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">Email Address</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.5);">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.5);">
            </div>
            
            <div style="margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center;">
                    <input type="checkbox" name="remember" id="remember" style="margin-right: 0.5rem;">
                    <label for="remember" style="color: var(--text-muted);">Remember me</label>
                </div>
                <a href="{{ url_for('forgot_password') }}" style="color: var(--accent-cyan); font-size: 0.9rem; text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Login to Dashboard</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-cyan); font-weight: 600; text-decoration: none;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
