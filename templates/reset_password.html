{% extends 'base.html' %}

{% block content %}
<div class="fade-in" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--text-main);">Confirm Reset</h2>
        
        <form method="POST" action="{{ url_for('reset_password') }}">
            <input type="hidden" name="email" value="{{ email }}">
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">6-Digit OTP</label>
                <input type="text" name="otp" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.5);">
            </div>
            
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">New Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.5);">
            </div>
            
            <button type="submit" class="btn btn-pink" style="width: 100%;">Save Password</button>
        </form>
    </div>
</div>
{% endblock %}
